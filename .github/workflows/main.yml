name: Auto Blog Bot
on:
  schedule:
    - cron: '0 0 * * *' # كل ليلة مع 12
  workflow_dispatch: # باش تخدمو بيدك دبا

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install requests tweepy
        
      - name: Run Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python generate_blog.py
        
      - name: Commit Changes
        run: |
          git config --global user.name 'TechieBot'
          git config --global user.email 'bot@techievest.com'
          git add .
          git commit -m "Auto-post: New blog article added" || echo "No changes to commit"
          git push
