name: Auto Blog Bot
on:
  schedule:
    - cron: '0 0 * * *' # غايخدم كل ليلة مع 12
  workflow_dispatch: # باش تقدر تخدمو بيدك وقتما بغيتي

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_blog.py
      - name: Commit Changes
        run: |
          git config --global user.name 'TechieBot'
          git config --global user.email 'bot@techievest.com'
          git add .
          git commit -m "Auto-post: New blog article added"
          git push
